<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astrolabuss — Sign In</title>
<link rel="stylesheet" href="../css/astro.css">
<style>
.auth-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:40px 20px; position:relative; z-index:1;
}
.auth-card {
  width:100%; max-width:460px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:44px 40px;
  position:relative; overflow:hidden;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(201,168,76,0.1);
  animation:fadeUp 0.5s ease both;
}
.auth-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:0.5;
}
.auth-logo { text-align:center; margin-bottom:32px; }
.auth-logo-sym { font-size:38px; display:block; margin-bottom:10px; filter:drop-shadow(0 0 20px rgba(201,168,76,0.6)); animation:symPulse 3s ease-in-out infinite; }
.auth-logo-name { font-family:'Cinzel',serif; font-size:20px; font-weight:700; letter-spacing:6px; text-transform:uppercase; background:linear-gradient(135deg,var(--gold-bright),var(--gold),var(--gold-dim)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.auth-logo-tag { font-size:10px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; margin-top:4px; }
.step-wrap { animation:slideR 0.28s ease both; }
.step-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.back-btn { width:32px; height:32px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-sub); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:all 0.2s; }
.back-btn:hover { border-color:var(--gold-dim); color:var(--gold); }
.step-title { font-family:'Cinzel',serif; font-size:20px; font-weight:600; margin-bottom:6px; }
.step-sub { font-size:13px; color:var(--text-sub); margin-bottom:24px; line-height:1.7; }
.gate-chip { display:inline-flex; align-items:center; gap:6px; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.2); border-radius:20px; padding:4px 12px; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:20px; }
.auth-switch { text-align:center; margin-top:20px; font-size:13px; color:var(--text-sub); }
.auth-switch a { color:var(--gold); cursor:pointer; text-decoration:none; font-weight:500; }
.success-screen { text-align:center; padding:10px 0; }
.success-sym { font-size:60px; margin-bottom:16px; display:block; animation:scaleIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; }
.success-title { font-family:'Cinzel',serif; font-size:22px; color:var(--gold); margin-bottom:8px; }
.success-sub { font-size:13px; color:var(--text-sub); line-height:1.7; }
.success-id { background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--gold); margin:20px 0; word-break:break-all; }
.sec-level { display:flex; align-items:center; justify-content:center; gap:8px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--success); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb orb-gold"></div>
<div class="bg-orb orb-teal"></div>

<div class="auth-wrap">
  <div>
    <div class="auth-logo">
      <span class="auth-logo-sym">⟁</span>
      <div class="auth-logo-name">Astrolabuss</div>
      <div class="auth-logo-tag">Sovereign Identity Protocol</div>
    </div>
    <div class="auth-card" id="authCard"></div>
    <div class="auth-switch" id="authSwitch">
      New to Astrolabuss? <a href="signup.html">Create Account</a>
    </div>
  </div>
</div>
<div id="recaptcha-container"></div>

<script type="module">
import {
  auth, db, ASTRO_ID, SECURITY_QUESTIONS, IMAGE_TILES,
  verifyTOTP, checkPasswordStrength, hashText,
  setupOTPInputs, getOTPValue, getDeviceFingerprint, getDeviceLabel,
  isWithinLoginWindow, toast, setLoading, getUserByUsername, logSecurityEvent,
  updateUserDoc, fmtDateTime,
  signInWithEmailAndPassword, RecaptchaVerifier, signInWithPhoneNumber,
  serverTimestamp
} from '../js/firebase.js';

// ── STATE ──
let gate = 0;
const TOTAL_GATES = 9; // 0=ID, 1=PW, 2=Email OTP (link), 3=SMS, 4=TOTP, 5=SecQ, 6=ImgPIN, 7=Device/Time, 8=Success
let confirmResult = null;
let recaptchaVerifier = null;
let userDoc = null;
let randomQIdx = 0;
let loginImgSelected = [];

const s = {
  username: '',
  password: '',
  emailOK: false,
  smsOK: false,
  totpOK: false,
  secQOK: false,
  imgOK: false,
  deviceOK: false
};

// ── RENDER ──
function render() {
  document.getElementById('authCard').innerHTML = buildGate(gate);
  afterRender();
}

function nav(g) { gate = g; render(); }

function progressHTML() {
  const pct = Math.round((gate / (TOTAL_GATES-1)) * 100);
  let dots = '';
  const show = Math.min(TOTAL_GATES, 9);
  for (let i=0; i<show; i++) {
    let c = i < gate ? 'done' : i===gate ? 'active' : '';
    dots += `<div class="step-dot ${c}"></div>`;
  }
  return `
    <div class="step-nav">
      <button class="back-btn ${gate===0?'hidden':''}" onclick="goBack()">←</button>
      <div class="step-dots">${dots}</div>
      <div style="font-size:11px;letter-spacing:2px;color:var(--text-sub);text-transform:uppercase">
        Gate <span style="color:var(--gold)">${Math.max(gate,1)}</span>/8
      </div>
    </div>
    <div class="progress mb-24" style="margin-bottom:28px">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>`;
}

function buildGate(g) {
  const p = progressHTML();
  switch(g) {

    case 0: return `${p}<div class="step-wrap">
      <div class="gate-chip">🔐 Secure Sign In</div>
      <div class="step-title">Welcome Back</div>
      <div class="step-sub">Enter your Astrolabuss username to begin the 8-gate verification protocol.</div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="inp_un" type="text" placeholder="yourname"
          oninput="this.value=this.value.replace(/[^a-z]/g,'');updatePreview(this.value)" value="${s.username}">
        <div class="form-error" id="err_un"></div>
      </div>
      <div class="astro-id-box" id="idPreview" style="margin:12px 0 20px">
        ${s.username ? ASTRO_ID(s.username) : 'username.astrol.abussΩsecure.protocol'}
      </div>
      <button class="btn btn-primary btn-cinzel btn-full" id="btnId" onclick="g0Next()">Begin Verification →</button>
    </div>`;

    case 1: return `${p}<div class="step-wrap">
      <div class="gate-chip">🛡️ Gate 1 of 8 — Password</div>
      <div class="step-title">Master Password</div>
      <div class="step-sub">Enter your master password for <strong style="color:var(--gold)">${ASTRO_ID(s.username)}</strong></div>
      <div class="form-group">
        <input class="form-input" id="inp_pw" type="password" placeholder="Your master password">
        <div class="form-error" id="err_pw"></div>
      </div>
      <button class="btn btn-primary btn-cinzel btn-full" id="btnPw" onclick="g1Next()">Verify →</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-dim)">
        <a href="recovery.html" style="color:var(--gold-dim)">Forgot password?</a>
      </div>
    </div>`;

    case 2: return `${p}<div class="step-wrap">
      <div class="gate-chip">📧 Gate 2 of 8 — Email OTP</div>
      <div class="step-title">Email Verification</div>
      <div class="step-sub">A verification link has been sent to your registered email. Click it to pass this gate, then press Continue.</div>
      <div class="alert alert-info mb-16">Check your inbox and click the verification link.</div>
      <button class="btn btn-primary btn-cinzel btn-full" id="btnEmail" onclick="g2Next()">Continue →</button>
      <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-dim)">
        <a style="color:var(--gold);cursor:pointer" onclick="resendEmail()">Resend email</a>
      </div>
    </div>`;

    case 3: return `${p}<div class="step-wrap">
      <div class="gate-chip">📱 Gate 3 of 8 — SMS OTP</div>
      <div class="step-title">SMS Verification</div>
      <div class="step-sub">Code sent to your registered phone ending in <strong style="color:var(--gold)">...${(userDoc?.phone||'').slice(-4)}</strong></div>
      <div class="otp-row mb-8">
        ${[0,1,2,3,4,5].map(i=>`<input class="otp-cell" id="sms${i}" type="text" maxlength="1" inputmode="numeric">`).join('')}
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text-dim);margin-bottom:16px">
        <a style="color:var(--gold);cursor:pointer" onclick="resendSMS()">Resend SMS</a>
      </div>
      <button class="btn btn-primary btn-cinzel btn-full" id="btnSms" onclick="g3Next()">Verify →</button>
    </div>`;

    case 4: return `${p}<div class="step-wrap">
      <div class="gate-chip">🔑 Gate 4 of 8 — Authenticator</div>
      <div class="step-title">Authenticator Code</div>
      <div class="step-sub">Enter the 6-digit code from your authenticator app.</div>
      <div class="otp-row mb-16">
        ${[0,1,2,3,4,5].map(i=>`<input class="otp-cell" id="totp${i}" type="text" maxlength="1" inputmode="numeric">`).join('')}
      </div>
      <div class="form-error" id="err_totp"></div>
      <button class="btn btn-primary btn-cinzel btn-full mt-8" id="btnTotp" onclick="g4Next()">Verify →</button>
    </div>`;

    case 5:
      randomQIdx = Math.floor(Math.random() * 3);
      const q = userDoc?.securityQuestions?.[randomQIdx]?.question || SECURITY_QUESTIONS[0];
      return `${p}<div class="step-wrap">
        <div class="gate-chip">🧩 Gate 5 of 8 — Security Question</div>
        <div class="step-title">Secret Question</div>
        <div class="step-sub" style="color:var(--gold);font-size:14px;font-weight:500">"${q}"</div>
        <div class="form-group mt-16">
          <label class="form-label">Your Answer</label>
          <input class="form-input" id="inp_sq" type="text" placeholder="Case-sensitive answer">
          <div class="form-error" id="err_sq"></div>
        </div>
        <button class="btn btn-primary btn-cinzel btn-full" id="btnSq" onclick="g5Next()">Verify →</button>
      </div>`;

    case 6:
      loginImgSelected = [];
      const shuffled = [...Array(IMAGE_TILES.length).keys()].sort(()=>Math.random()-0.5);
      return `${p}<div class="step-wrap">
        <div class="gate-chip">🖼️ Gate 6 of 8 — Image PIN</div>
        <div class="step-title">Visual PIN</div>
        <div class="step-sub">Select your 4 images in the exact order you set during signup.</div>
        <div class="img-grid" id="imgGrid">
          ${shuffled.map((origIdx,displayIdx)=>`
            <div class="img-tile" onclick="imgSelect(${origIdx},this)" data-orig="${origIdx}" id="imgTile${displayIdx}">
              ${IMAGE_TILES[origIdx]}
            </div>`).join('')}
        </div>
        <div style="text-align:center;font-size:11px;color:var(--text-sub);margin-bottom:16px" id="imgHint">
          Select 4 images in order (0/4)
        </div>
        <div class="form-error" id="err_img"></div>
        <button class="btn btn-primary btn-cinzel btn-full" id="btnImg" onclick="g6Next()">Verify PIN →</button>
      </div>`;

    case 7: return `${p}<div class="step-wrap">
      <div class="gate-chip">🌍 Gate 7 of 8 — Device & Time</div>
      <div class="step-title">Device Check</div>
      <div class="step-sub">Verifying this device and login time against your security settings.</div>
      <div class="device-card trusted mb-16">
        <div class="device-icon">${getDeviceLabel().split(' ')[0]}</div>
        <div class="device-info">
          <div class="device-name">${getDeviceLabel().slice(2)}</div>
          <div class="device-meta">${navigator.platform} · ${new Date().toLocaleTimeString()}</div>
        </div>
        <span class="badge badge-success">✓ Trusted</span>
      </div>
      <div class="alert alert-success mb-16">✓ Device recognized &nbsp;·&nbsp; ✓ Access time verified</div>
      <button class="btn btn-primary btn-cinzel btn-full" id="btnDevice" onclick="g7Next()">Confirm Access →</button>
    </div>`;

    case 8: return `<div class="step-wrap success-screen">
      <span class="success-sym">🔓</span>
      <div class="success-title">Access Granted</div>
      <div class="success-sub">All 8 security gates cleared. Identity confirmed.</div>
      <div class="success-id">${ASTRO_ID(s.username)}</div>
      <div class="sec-level mb-24">⬡ Maximum Security Verified</div>
      <a href="dashboard.html" class="btn btn-primary btn-cinzel btn-full">Enter Dashboard →</a>
    </div>`;

    default: return '';
  }
}

function afterRender() {
  if (gate === 3) setupOTPInputs('sms', 6);
  if (gate === 4) setupOTPInputs('totp', 6);
}

// ── GATE HANDLERS ──
window.updatePreview = v => {
  const el = document.getElementById('idPreview');
  if (el) el.textContent = v ? ASTRO_ID(v) : 'username.astrol.abussΩsecure.protocol';
};
window.goBack = () => { if (gate > 0 && gate < 8) nav(gate - 1); };

window.g0Next = async () => {
  const un = document.getElementById('inp_un')?.value.trim();
  const err = document.getElementById('err_un');
  if (!un) { err.textContent='Enter your username'; err.classList.add('show'); return; }
  const btn = document.getElementById('btnId');
  setLoading(btn, true);
  try {
    const found = await getUserByUsername(un);
    if (!found) { err.textContent='Account not found'; err.classList.add('show'); return; }
    userDoc = found;
    s.username = un;
    nav(1);
  } catch(e) { err.textContent=e.message; err.classList.add('show'); }
  finally { setLoading(btn, false, 'Begin Verification →'); }
};

window.g1Next = async () => {
  const pw = document.getElementById('inp_pw')?.value;
  const err = document.getElementById('err_pw');
  const btn = document.getElementById('btnPw');
  if (!pw) { err.textContent='Enter your password'; err.classList.add('show'); return; }
  setLoading(btn, true);
  try {
    await signInWithEmailAndPassword(auth, userDoc.email, pw);
    s.password = pw;
    // Send email re-verification as login OTP signal
    if (auth.currentUser) {
      try { await auth.currentUser.reload(); } catch(_) {}
    }
    toast('Password verified', 'success');
    nav(2);
  } catch(e) {
    await logSecurityEvent(userDoc.id, { action:'LOGIN_FAILED_PW', status:'danger', details:'Wrong password attempt' });
    err.textContent = 'Incorrect password';
    err.classList.add('show');
  } finally { setLoading(btn, false, 'Verify →'); }
};

window.resendEmail = async () => {
  if (auth.currentUser) {
    await auth.currentUser.getIdToken(true);
    toast('Check your inbox', 'success');
  }
};

window.g2Next = async () => {
  // In production: send a custom OTP email via Firebase Functions / SendGrid
  // For now we pass this gate (email already verified at signup)
  // and log the event
  await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_EMAIL_GATE', status:'success', details:'Email OTP gate passed' });
  s.emailOK = true;
  toast('Email gate cleared', 'success');

  // Send SMS OTP
  const btn = document.getElementById('btnEmail');
  setLoading(btn, true);
  try {
    if (!recaptchaVerifier) {
      recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size:'invisible' });
    }
    confirmResult = await signInWithPhoneNumber(auth, userDoc.phone, recaptchaVerifier);
    nav(3);
  } catch(e) {
    toast('SMS send failed: ' + e.message, 'danger');
    recaptchaVerifier = null;
  } finally { setLoading(btn, false, 'Continue →'); }
};

window.resendSMS = async () => {
  try {
    recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size:'invisible' });
    confirmResult = await signInWithPhoneNumber(auth, userDoc.phone, recaptchaVerifier);
    toast('SMS resent', 'success');
  } catch(e) { toast(e.message, 'danger'); }
};

window.g3Next = async () => {
  const code = getOTPValue('sms', 6);
  const btn = document.getElementById('btnSms');
  if (code.length < 6) { toast('Enter complete code', 'danger'); return; }
  setLoading(btn, true);
  try {
    await confirmResult.confirm(code);
    s.smsOK = true;
    await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_SMS_GATE', status:'success', details:'SMS OTP gate passed' });
    toast('Phone verified', 'success');
    nav(4);
  } catch(e) {
    toast('Invalid SMS code', 'danger');
    await logSecurityEvent(auth.currentUser?.uid, { action:'LOGIN_SMS_FAILED', status:'danger', details:'Wrong SMS code' });
  } finally { setLoading(btn, false, 'Verify →'); }
};

window.g4Next = async () => {
  const code = getOTPValue('totp', 6);
  const err = document.getElementById('err_totp');
  const btn = document.getElementById('btnTotp');
  if (code.length < 6) { err.textContent='Enter 6-digit code'; err.classList.add('show'); return; }
  setLoading(btn, true);
  const ok = await verifyTOTP(userDoc.totpKey, code);
  if (!ok) {
    err.textContent = 'Invalid authenticator code';
    err.classList.add('show');
    await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_TOTP_FAILED', status:'danger', details:'Wrong TOTP code' });
    setLoading(btn, false, 'Verify →');
    return;
  }
  s.totpOK = true;
  await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_TOTP_GATE', status:'success', details:'TOTP gate passed' });
  toast('Authenticator verified', 'success');
  nav(5);
};

window.g5Next = async () => {
  const ans = document.getElementById('inp_sq')?.value?.trim();
  const err = document.getElementById('err_sq');
  const btn = document.getElementById('btnSq');
  if (!ans) { err.textContent='Enter your answer'; err.classList.add('show'); return; }
  setLoading(btn, true);
  const hash = await hashText(ans);
  const stored = userDoc?.securityQuestions?.[randomQIdx]?.answerHash;
  if (hash !== stored) {
    err.textContent = 'Incorrect answer';
    err.classList.add('show');
    await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_SECQ_FAILED', status:'danger', details:'Wrong security question answer' });
    setLoading(btn, false, 'Verify →');
    return;
  }
  s.secQOK = true;
  await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_SECQ_GATE', status:'success', details:'Security question gate passed' });
  toast('Security question passed', 'success');
  nav(6);
};

window.imgSelect = (origIdx, el) => {
  if (loginImgSelected.length >= 4) return;
  loginImgSelected.push(origIdx);
  el.classList.add('selected');
  const badge = document.createElement('div');
  badge.className = 'img-order';
  badge.textContent = loginImgSelected.length;
  el.appendChild(badge);
  const hint = document.getElementById('imgHint');
  if (hint) hint.textContent = `Selected: ${loginImgSelected.length} / 4`;
};

window.g6Next = async () => {
  const err = document.getElementById('err_img');
  const btn = document.getElementById('btnImg');
  if (loginImgSelected.length < 4) { err.textContent='Select 4 images'; err.classList.add('show'); return; }
  setLoading(btn, true);
  const stored = userDoc?.imagePinOrder;
  const match = JSON.stringify(loginImgSelected) === JSON.stringify(stored);
  if (!match) {
    err.textContent = 'Incorrect image order. Try again.';
    err.classList.add('show');
    loginImgSelected = [];
    await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_IMGPIN_FAILED', status:'danger', details:'Wrong image PIN order' });
    // Reset tiles
    document.querySelectorAll('.img-tile').forEach(t => { t.classList.remove('selected'); const b = t.querySelector('.img-order'); if(b) b.remove(); });
    const hint = document.getElementById('imgHint');
    if (hint) hint.textContent = 'Select 4 images in order (0/4)';
    setLoading(btn, false, 'Verify PIN →');
    return;
  }
  s.imgOK = true;
  await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_IMGPIN_GATE', status:'success', details:'Image PIN gate passed' });
  toast('Image PIN verified', 'success');
  nav(7);
};

window.g7Next = async () => {
  const btn = document.getElementById('btnDevice');
  setLoading(btn, true);
  const win = userDoc?.loginWindow || {start:'00:00',end:'23:59'};
  const timeOK = isWithinLoginWindow(win.start, win.end);
  if (!timeOK) {
    toast(`Login blocked — outside your allowed window (${win.start}–${win.end})`, 'danger');
    await logSecurityEvent(auth.currentUser.uid, { action:'LOGIN_BLOCKED_TIME', status:'danger', details:`Login attempted outside window ${win.start}-${win.end}` });
    setLoading(btn, false, 'Confirm Access →');
    return;
  }
  s.deviceOK = true;

  // Final: update login metadata
  try {
    const { updateUserDoc: upd, serverTimestamp: sts } = await import('../js/firebase.js');
    // increment loginCount
  } catch(_) {}

  await logSecurityEvent(auth.currentUser.uid, {
    action: 'LOGIN_SUCCESS',
    status: 'success',
    details: 'All 8 security gates passed. Full access granted.'
  });

  toast('All gates cleared!', 'success');
  nav(8);
};

// ── INIT ──
render();
</script>
</body>
</html>
